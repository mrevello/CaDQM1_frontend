version: '3.8'

services:
  frontend:
    container_name: cadqm_frontend_web
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    environment:
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway" 